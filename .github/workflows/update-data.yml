name: Update World Cup data

on:
  schedule:
    # 07:00 UTC every day - overnight results are in by then
    - cron: "0 7 * * *"
  workflow_dispatch: {}   # lets you trigger it by hand from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest scorers
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit if anything changed
        run: |
          git config user.name "wc-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "No new goals since yesterday." && exit 0
          git commit -m "Data refresh $(date -u +%F)"
          git push
